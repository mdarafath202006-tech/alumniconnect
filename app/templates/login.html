{% extends "base.html" %}
{% block title %}Login – AlumniConnect{% endblock %}
{% block content %}
<div class="row justify-content-center" style="min-height:70vh;align-items:center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 fade-up">
      <div class="text-center mb-4">
        <div class="av av-lg av-accent mx-auto mb-3"><i class="fas fa-graduation-cap"></i></div>
        <h3 style="font-weight:800">Welcome back</h3>
        <p class="muted" style="font-size:.88rem">Sign in to continue</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" id="pwInput" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="input-group-text" style="cursor:pointer;border-radius:0 10px 10px 0!important" onclick="togglePw()">
              <i class="fas fa-eye" id="pwEye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-accent w-100 py-2">
          <i class="fas fa-right-to-bracket me-2"></i>Sign In
        </button>
      </form>

      <div class="text-center mt-4" style="font-size:.88rem;color:var(--muted)">
        No account? <a href="{{ url_for('auth.register') }}" style="color:var(--accent);font-weight:600">Create one →</a>
      </div>
    </div>

    <!-- Security notice -->
    <p class="text-center mt-3" style="font-size:.78rem;color:var(--muted)">
      <i class="fas fa-shield-halved me-1"></i>
      Protected by rate limiting &amp; CSRF prevention
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw() {
  const i = document.getElementById('pwInput');
  const e = document.getElementById('pwEye');
  i.type = i.type === 'password' ? 'text' : 'password';
  e.className = i.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
{% endblock %}
